name: SCQ arXiv Daily Digest

on:
  schedule:
    # Target: ready in inbox by ~7 AM US Eastern.
    # 10:45 UTC = 6:45 AM EDT / 5:45 AM EST. GitHub Actions scheduled
    # workflows typically lag 15-60 min, so EDT arrival lands near 7 AM.
    # In EST (winter) it'll arrive closer to 6 AM — still before work.
    - cron: '45 10 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to look back (1 = today only, 7 = past week, 14 = two weeks)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '3'
          - '7'
          - '14'
          - '30'

permissions:
  contents: read  # Digests are uploaded as artifacts only (no repo writes)

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SCQ_EMAIL_FROM: ${{ secrets.SCQ_EMAIL_FROM }}
          SCQ_EMAIL_APP_PASSWORD: ${{ secrets.SCQ_EMAIL_APP_PASSWORD }}
          SCQ_EMAIL_TO: ${{ secrets.SCQ_EMAIL_TO }}
        run: |
          missing=()
          [ -z "$SCQ_EMAIL_FROM" ]        && missing+=("SCQ_EMAIL_FROM")
          [ -z "$SCQ_EMAIL_APP_PASSWORD" ] && missing+=("SCQ_EMAIL_APP_PASSWORD")
          [ -z "$SCQ_EMAIL_TO" ]          && missing+=("SCQ_EMAIL_TO")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: the following repository secrets are missing or empty:"
            for s in "${missing[@]}"; do echo "  - $s"; done
            echo "Go to Settings → Secrets and variables → Actions to add them."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Install scq (with feedparser, jsonschema, tomli backport) so the
        # digest script can read recipients from data/user_config/digest.json
        # via scq.config.user.load_config. Falls back to the SCQ_EMAIL_TO
        # secret if no user override is checked in.
        run: pip install .

      - name: Run arXiv digest
        env:
          SCQ_EMAIL_FROM: ${{ secrets.SCQ_EMAIL_FROM }}
          SCQ_EMAIL_APP_PASSWORD: ${{ secrets.SCQ_EMAIL_APP_PASSWORD }}
          SCQ_EMAIL_TO: ${{ secrets.SCQ_EMAIL_TO }}
        run: |
          # Manual trigger: use the selected days_back value
          # Scheduled trigger: always 3 days (catches weekend submissions);
          # dedup by arXiv ID prevents repeats in the database
          if [ -n "${{ github.event.inputs.days_back }}" ]; then
            DAYS="${{ github.event.inputs.days_back }}"
          else
            DAYS=3
          fi
          echo "Looking back $DAYS day(s)"
          python tools/arxiv_digest.py --days $DAYS --max-results 1000 --smart-weekend --require-email

      # Note: digests are no longer committed to the repo (2026-05-01).
      # They live as a 30-day workflow artifact (downloadable from the run
      # page) and are also emailed to recipients by `tools/arxiv_digest.py`.
      # Locally-generated digests go to `paths().digests_dir`, which the
      # user's `data/user_config/paths.toml` can point at OneDrive.
      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digests/
          retention-days: 30
