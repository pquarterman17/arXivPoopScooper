name: SCQ arXiv Daily Digest

on:
  schedule:
    # Runs at 7:00 AM EST (12:00 UTC) every day
    # Adjust the hour if you're in a different timezone
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to look back (1 = today only, 7 = past week, 14 = two weeks)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '3'
          - '7'
          - '14'
          - '30'

permissions:
  contents: write  # Needed to commit digest HTML to repo

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run arXiv digest
        env:
          SCQ_EMAIL_FROM: ${{ secrets.SCQ_EMAIL_FROM }}
          SCQ_EMAIL_APP_PASSWORD: ${{ secrets.SCQ_EMAIL_APP_PASSWORD }}
          SCQ_EMAIL_TO: ${{ secrets.SCQ_EMAIL_TO }}
        run: |
          # Manual trigger: use the selected days_back value
          # Scheduled trigger: always 3 days (catches weekend submissions);
          # dedup by arXiv ID prevents repeats in the database
          if [ -n "${{ github.event.inputs.days_back }}" ]; then
            DAYS="${{ github.event.inputs.days_back }}"
          else
            DAYS=3
          fi
          echo "Looking back $DAYS day(s)"
          python tools/arxiv_digest.py --days $DAYS --smart-weekend

      - name: Commit digest to repo
        run: |
          git config user.name "SCQ Digest Bot"
          git config user.email "actions@github.com"
          git add digests/
          git add pending_papers.json || true
          if git diff --staged --quiet; then
            echo "No new digest to commit"
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "Daily digest: $DATE"
            git push
          fi

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: digests/
          retention-days: 30
