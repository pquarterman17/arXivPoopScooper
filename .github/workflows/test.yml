name: Tests

on:
  push:
    # Run on main and on every feature/fix/refactor branch so we get a
    # green/red light on every push, not just at PR-open time. Avoids the
    # "I forgot to run tests on the branch and discovered breakage at PR
    # review" failure mode.
    branches: [main, 'feat/**', 'fix/**', 'refactor/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  vitest:
    name: vitest (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest suite
        run: npm test

  pytest:
    name: pytest (scq)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest suite
        run: pytest tests/ -v
