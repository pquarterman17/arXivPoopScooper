<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCQ — To Read</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e1117; --bg2: #161b22; --bg3: #1c2333;
    --border: #2d3548; --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --accent: #58a6ff; --accent2: #1f6feb; --green: #3fb950;
    --orange: #d29922; --tag-bg: rgba(88,166,255,0.12); --tag-border: rgba(88,166,255,0.25);
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    padding: 24px; max-width: 800px; margin: 0 auto;
  }

  .header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .header p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .header a { color: var(--accent); text-decoration: none; font-size: 13px; }
  .header a:hover { text-decoration: underline; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text3);
    font-size: 15px;
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

  .paper-card {
    border: 1.5px solid var(--border); border-radius: var(--radius);
    background: var(--bg2); padding: 16px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .paper-card:hover { border-color: var(--accent2); }

  .paper-title { font-size: 14px; font-weight: 600; line-height: 1.35; margin-bottom: 4px; }
  .paper-meta { font-size: 12px; color: var(--text2); margin-bottom: 8px; }

  .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; letter-spacing: 0.03em; }
  .badge-arxiv { background: var(--accent2); color: #fff; }
  .badge-group { background: var(--bg3); color: var(--text2); }
  .badge-date { background: rgba(210,153,34,0.15); color: var(--orange); }

  .summary { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    border: 1px solid var(--border); color: var(--text3); font-weight: 500;
  }

  .actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  .action-btn {
    display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
    font-size: 11px; font-weight: 600; border: 1px solid var(--border);
    border-radius: 5px; cursor: pointer; background: var(--bg); color: var(--text2);
    font-family: inherit; transition: all 0.15s; text-decoration: none;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mark-read-btn { border-color: var(--green); color: var(--green); }
  .mark-read-btn:hover { background: rgba(63,185,80,0.1); }

  .count-bar {
    font-size: 12px; color: var(--text3); margin-bottom: 16px;
    padding: 8px 12px; background: var(--bg2); border-radius: 6px;
    border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
  }
  .count-bar strong { color: var(--orange); }

  /* Star rating */
  .star-rating { display: inline-flex; gap: 2px; align-items: center; margin-left: 8px; }
  .star-btn {
    background: none; border: none; cursor: pointer; font-size: 16px; padding: 0 1px;
    color: var(--text3); transition: color 0.12s; line-height: 1;
  }
  .star-btn.filled { color: var(--orange); }
  .star-btn:hover { color: var(--orange); }
  .priority-label { font-size: 10px; color: var(--orange); font-weight: 600; margin-left: 4px; }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
  .search-input {
    width: 100%; padding: 8px 12px 8px 34px; border: 1.5px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .pdf-link-btn {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    font-size: 11px; font-weight: 600; font-family: inherit;
    background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3);
    color: var(--green); border-radius: 5px; cursor: pointer; text-decoration: none;
  }
  .pdf-link-btn:hover { background: rgba(63,185,80,0.2); }
</style>
</head>
<body>

<div class="header">
  <h1>Reading List</h1>
  <p>Papers you haven't read yet</p>
  <a href="paper_database.html">← Back to full database</a>
</div>

<div class="search-wrap">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input class="search-input" type="text" placeholder="Search reading list..." id="search-input">
</div>

<div class="count-bar">
  <span><strong id="unread-count">0</strong> papers to read</span>
  <span id="last-updated" style="font-size:11px"></span>
</div>

<div id="content"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<script src="scq_data.js"></script>
<script src="db_utils.js"></script>
<script>
let PAPERS = [];
let searchQuery = "";

function _jp(s, fb) { try { return JSON.parse(s); } catch { return fb; } }

function getPdfPath(id) {
  return "pdfs/" + id.replace(/[^a-zA-Z0-9._-]/g, "_") + ".pdf";
}

function loadPapers() {
  const rows = SCQ.getAllPapers();
  PAPERS = rows.map(r => ({
    id: r.id, title: r.title, shortAuthors: r.short_authors || "",
    year: r.year, group: r.group_name || "", dateAdded: r.date_added || "",
    tags: _jp(r.tags, []), summary: r.summary || "",
    _read: !!r.is_read, _priority: r.priority || 0
  }));
}

function markRead(paperId) {
  SCQ.setReadStatus(paperId, true);
  const p = PAPERS.find(x => x.id === paperId);
  if (p) p._read = true;
  renderList();
}

function setStarRating(paperId, stars) {
  const p = PAPERS.find(x => x.id === paperId);
  const newP = (p && p._priority === stars) ? 0 : stars;
  SCQ.setPriority(paperId, newP);
  if (p) p._priority = newP;
  renderList();
}

function renderStars(paperId) {
  const p = PAPERS.find(x => x.id === paperId);
  const current = p ? p._priority : 0;
  return [1,2,3].map(s =>
    `<button class="star-btn ${s <= current ? 'filled' : ''}" onclick="setStarRating('${paperId}', ${s})" title="${s} star${s>1?'s':''}">&#9733;</button>`
  ).join("");
}

function renderList() {
  const q = searchQuery.toLowerCase();
  const unread = PAPERS.filter(p => !p._read)
    .filter(p => !q ||
      p.title.toLowerCase().includes(q) ||
      p.shortAuthors.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q)) ||
      p.summary.toLowerCase().includes(q) ||
      p.group.toLowerCase().includes(q))
    .sort((a, b) => (b._priority || 0) - (a._priority || 0));
  document.getElementById("unread-count").textContent = unread.length;

  const content = document.getElementById("content");

  if (unread.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div class="emoji">&#127881;</div>
      <div>All caught up! No unread papers.</div>
    </div>`;
    return;
  }

  // Smart date grouping
  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
  const monthAgo = new Date(now); monthAgo.setMonth(monthAgo.getMonth() - 1);
  function dateGroup(dateStr) {
    if (!dateStr) return "Older";
    const d = new Date(dateStr);
    if (d >= weekAgo) return "Added this week";
    if (d >= monthAgo) return "Added this month";
    return "Older";
  }
  const groups = {};
  unread.forEach(p => {
    const g = dateGroup(p.dateAdded);
    if (!groups[g]) groups[g] = [];
    groups[g].push(p);
  });
  const groupOrder = ["Added this week", "Added this month", "Older"];

  let html = "";
  groupOrder.forEach(g => {
    if (!groups[g] || groups[g].length === 0) return;
    html += `<div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${g} <span style="font-weight:400;text-transform:none">(${groups[g].length})</span></div>`;
    html += groups[g].map(p => `
    <div class="paper-card">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div class="paper-title" style="flex:1">${p.title}</div>
        <div class="star-rating">${renderStars(p.id)}</div>
      </div>
      <div class="paper-meta">${p.shortAuthors} — ${p.year}</div>
      <div class="badges">
        <span class="badge badge-arxiv">${p.id}</span>
        <span class="badge badge-group">${p.group}</span>
        ${p.dateAdded ? `<span class="badge badge-date">added ${p.dateAdded}</span>` : ''}
      </div>
      <div class="summary">${p.summary}</div>
      <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <div class="actions">
        <button class="action-btn mark-read-btn" onclick="markRead('${p.id}')">&#10003; Mark as read</button>
        <a class="action-btn" href="https://arxiv.org/abs/${p.id}" target="_blank">arXiv &#8599;</a>
        <a class="pdf-link-btn" href="${getPdfPath(p.id)}" target="_blank">PDF</a>
        <a class="action-btn" href="paper_database.html" target="_blank">Full entry &#8599;</a>
      </div>
    </div>
  `).join("");
  });
  content.innerHTML = html;
}

document.getElementById("search-input").addEventListener("input", function() {
  searchQuery = this.value;
  renderList();
});

SCQ.init().then(() => {
  loadPapers();
  renderList();
});
</script>
</body>
</html>
