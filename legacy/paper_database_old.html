<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCQ Paper Database</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
  
  :root {
    --bg: #0e1117;
    --bg2: #161b22;
    --bg3: #1c2333;
    --border: #2d3548;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --accent: #58a6ff;
    --accent2: #1f6feb;
    --green: #3fb950;
    --red: #f85149;
    --orange: #d29922;
    --tag-bg: rgba(88,166,255,0.12);
    --tag-border: rgba(88,166,255,0.25);
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Header */
  .header { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* Search + controls */
  .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1 1 240px; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
  .search-input {
    width: 100%; padding: 8px 12px 8px 34px; border: 1.5px solid var(--border);
    border-radius: var(--radius); font-size: 13px; background: var(--bg2);
    color: var(--text); outline: none; font-family: inherit;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .view-btns { display: flex; gap: 4px; }
  .view-btn {
    padding: 6px 14px; font-size: 12px; font-weight: 600; border-radius: 5px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .view-btn.active { border-color: var(--accent); background: var(--accent2); color: #fff; }

  /* Tags */
  .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
  .tag-btn {
    padding: 3px 10px; font-size: 11px; border-radius: 12px;
    border: 1px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; font-weight: 500; font-family: inherit; transition: all 0.15s;
  }
  .tag-btn.active { border-color: var(--accent); background: var(--tag-bg); color: var(--accent); }
  .tag-btn.clear { border-color: var(--red); color: var(--red); }

  /* Read status */
  .read-toggle {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 11px; font-weight: 600; color: var(--text3); flex-shrink: 0;
    padding: 3px 8px; border-radius: 4px; transition: all 0.15s;
    user-select: none;
  }
  .read-toggle:hover { color: var(--text2); background: rgba(255,255,255,0.04); }
  .read-toggle input[type="checkbox"] {
    appearance: none; -webkit-appearance: none; width: 16px; height: 16px;
    border: 2px solid var(--border); border-radius: 4px; cursor: pointer;
    position: relative; transition: all 0.15s; flex-shrink: 0;
  }
  .read-toggle input[type="checkbox"]:checked {
    background: var(--green); border-color: var(--green);
  }
  .read-toggle input[type="checkbox"]:checked::after {
    content: "✓"; position: absolute; top: -1px; left: 2px;
    font-size: 11px; color: #fff; font-weight: 700;
  }
  .read-status-label { white-space: nowrap; }
  .read-status-label.is-read { color: var(--green); }
  .filter-read-btns { display: flex; gap: 4px; margin-left: 4px; }
  .filter-read-btn {
    padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 5px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text3);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .filter-read-btn.active { border-color: var(--orange); background: rgba(210,153,34,0.12); color: var(--orange); }

  /* Star rating */
  .star-rating { display: flex; gap: 2px; flex-shrink: 0; align-items: center; margin-right: 4px; }
  .star-btn {
    background: none; border: none; cursor: pointer; font-size: 16px; padding: 0 1px;
    color: var(--text3); transition: color 0.12s; line-height: 1;
  }
  .star-btn.filled { color: var(--orange); }
  .star-btn:hover { color: var(--orange); }
  .priority-filter { display: flex; gap: 4px; margin-left: 4px; }
  .priority-filter-btn {
    padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 5px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text3);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .priority-filter-btn.active { border-color: var(--accent); background: rgba(88,166,255,0.12); color: var(--accent); }

  /* Type filter */
  .type-filter { display: flex; gap: 4px; margin-left: 4px; flex-wrap: wrap; }
  .type-filter-btn {
    padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 5px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text3);
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .type-filter-btn.active { border-color: var(--green); background: rgba(63,185,80,0.12); color: var(--green); }
  .badge-type {
    font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600;
    letter-spacing: 0.03em;
  }

  /* Related papers */
  .related-papers { display: flex; gap: 6px; flex-wrap: wrap; }
  .related-chip {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    font-size: 11px; font-weight: 500; border-radius: 12px; cursor: pointer;
    border: 1px solid var(--border); color: var(--text2); background: var(--bg);
    transition: all 0.15s; text-decoration: none;
  }
  .related-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.06); }
  .related-reason { font-size: 10px; color: var(--text3); font-style: italic; }

  /* Paper card */
  .paper {
    border: 1.5px solid var(--border); border-radius: var(--radius);
    margin-bottom: 10px; background: var(--bg2); overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .paper.expanded { box-shadow: 0 0 20px rgba(88,166,255,0.06); border-color: var(--accent2); }
  
  .paper-header {
    padding: 12px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
    user-select: none;
  }
  .paper-header:hover { background: rgba(255,255,255,0.02); }
  
  .chevron { transition: transform 0.2s; color: var(--text3); margin-top: 3px; flex-shrink: 0; }
  .chevron.open { transform: rotate(90deg); }
  
  .paper-title { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .paper-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .paper-badges { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600;
    letter-spacing: 0.03em;
  }
  .badge-arxiv { background: var(--accent2); color: #fff; }
  .badge-group { background: var(--bg3); color: var(--text2); }

  /* Expanded content */
  .paper-body { padding: 0 16px 16px 44px; font-size: 13px; }
  
  .section-label {
    font-weight: 700; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text3); margin-bottom: 5px;
  }
  .section { margin-bottom: 16px; }
  
  .result-item { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
  .result-bullet { color: var(--accent); font-weight: 700; font-size: 12px; }
  .result-text { font-size: 12.5px; }

  /* Figures */
  .fig-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
  .fig-card {
    border: 1px solid var(--border); border-radius: 6px; background: var(--bg);
    overflow: hidden; cursor: pointer; transition: border-color 0.15s;
  }
  .fig-card:hover { border-color: var(--accent); }
  .fig-card img { width: 100%; display: block; }
  .fig-card .fig-label {
    padding: 6px 8px; font-size: 11px; display: flex; gap: 6px;
  }
  .fig-card .fig-label strong { color: var(--accent); }
  .fig-card .fig-label span { color: var(--text2); }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    cursor: zoom-out; padding: 40px;
  }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 4px; }
  .lightbox-caption {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 16px; font-size: 12px; color: var(--text2); max-width: 600px;
    text-align: center;
  }

  /* Notes */
  .notes-area {
    width: 100%; min-height: 56px; padding: 8px 10px; border: 1.5px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--text); font-size: 12.5px;
    font-family: inherit; resize: vertical; outline: none; line-height: 1.5;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--text3); }
  .notes-saved { font-size: 11px; color: var(--green); margin-top: 4px; opacity: 0; transition: opacity 0.3s; }
  .notes-saved.show { opacity: 1; }

  /* Tag pills in expanded view */
  .tag-pill {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    border: 1px solid var(--border); color: var(--text2); font-weight: 500;
    display: inline-block; margin: 0 4px 4px 0;
  }

  /* Action buttons */
  .action-btns { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .action-btn {
    display: flex; align-items: center; gap: 5px; padding: 5px 12px;
    font-size: 11px; font-weight: 600; border: 1px solid var(--border);
    border-radius: 5px; cursor: pointer; background: var(--bg); color: var(--text2);
    font-family: inherit; transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.copied { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1.5px solid var(--border); }
  .table-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .table-wrap th {
    padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px;
    color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em;
    background: var(--bg3); border-bottom: 1.5px solid var(--border);
    cursor: pointer; user-select: none; transition: color 0.12s; white-space: nowrap;
  }
  .table-wrap th:hover { color: var(--accent); }
  .table-wrap th.sorted { color: var(--accent); }
  .sort-arrow { font-size: 10px; margin-left: 3px; opacity: 0.4; }
  .table-wrap th.sorted .sort-arrow { opacity: 1; }
  .table-wrap td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .table-wrap tr:hover td { background: rgba(255,255,255,0.02); }
  .table-arxiv { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--accent); }
  .table-arxiv a { color: inherit; text-decoration: none; }
  /* Word cite button in table */
  .word-cite-btn {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
    font-size: 10px; font-weight: 600; border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer; background: var(--bg); color: var(--text3);
    font-family: inherit; transition: all 0.12s; white-space: nowrap;
  }
  .word-cite-btn:hover { border-color: var(--accent); color: var(--accent); }
  .word-cite-btn.copied { border-color: var(--green); color: var(--green); }

  /* Cite view */
  .cite-export-btns { display: flex; gap: 8px; margin-bottom: 16px; }
  .export-btn {
    display: flex; align-items: center; gap: 6px; padding: 8px 18px;
    font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .export-btn.primary { border: 1.5px solid var(--accent); background: var(--accent2); color: #fff; }
  .export-btn.secondary { border: 1.5px solid var(--border); background: var(--bg2); color: var(--text); }
  .export-btn.copied { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }

  .cite-card {
    padding: 12px 16px; margin-bottom: 8px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg2);
  }
  .cite-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
  .cite-text {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 8px 12px;
    background: var(--bg); border-radius: 4px; color: var(--text2);
    white-space: pre-wrap; word-break: break-word; margin-bottom: 6px;
    border: 1px solid var(--border);
  }

  /* Footer */
  .footer {
    margin-top: 24px; padding-top: 12px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .footer-info { font-size: 11px; color: var(--text3); }

  /* Collections sidebar */
  .app-layout { display: flex; gap: 0; }
  .sidebar {
    width: 200px; min-width: 200px; border-right: 1.5px solid var(--border);
    padding: 12px 0; margin-right: 20px; flex-shrink: 0;
    position: sticky; top: 0; max-height: 100vh; overflow-y: auto;
  }
  .sidebar-header {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text3); padding: 0 12px 6px; margin-top: 12px;
  }
  .sidebar-header:first-child { margin-top: 0; }
  .sidebar-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    font-size: 13px; cursor: pointer; color: var(--text2); border-radius: 4px;
    margin: 1px 4px; transition: all 0.12s; user-select: none;
  }
  .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .sidebar-item.active { background: rgba(88,166,255,0.1); color: var(--accent); font-weight: 600; }
  .sidebar-item .item-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .sidebar-item .item-count {
    margin-left: auto; font-size: 11px; color: var(--text3); font-weight: 500;
    background: var(--bg3); padding: 1px 6px; border-radius: 8px; min-width: 20px; text-align: center;
  }
  .sidebar-item.active .item-count { background: rgba(88,166,255,0.15); color: var(--accent); }
  .sidebar-divider { border-top: 1px solid var(--border); margin: 8px 12px; }
  .add-collection-btn {
    display: flex; align-items: center; gap: 6px; padding: 5px 12px; margin: 4px 4px;
    font-size: 12px; color: var(--text3); cursor: pointer; border: none;
    background: none; font-family: inherit; border-radius: 4px; width: calc(100% - 8px);
    text-align: left; transition: all 0.12s;
  }
  .add-collection-btn:hover { color: var(--accent); background: rgba(255,255,255,0.04); }
  .main-content { flex: 1; min-width: 0; }

  /* Collection assign button in cards */
  .collection-assign { position: relative; display: inline-block; }
  .collection-dropdown {
    position: absolute; bottom: 100%; left: 0; z-index: 100; margin-bottom: 4px;
    background: var(--bg2); border: 1.5px solid var(--border); border-radius: 6px;
    padding: 6px 0; min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .collection-dropdown-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    font-size: 12px; cursor: pointer; color: var(--text2); transition: all 0.1s;
  }
  .collection-dropdown-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .collection-dropdown-item .cdi-check { width: 14px; color: var(--green); font-weight: 700; }

  /* Modal for new collection */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 20px; min-width: 300px; max-width: 400px;
  }
  .modal h3 { font-size: 15px; margin-bottom: 12px; }
  .modal input[type="text"] {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; margin-bottom: 12px;
  }
  .modal input[type="text"]:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; border: 1.5px solid var(--border);
    background: transparent; color: var(--text2); transition: all 0.12s;
  }
  .modal-btn:hover { border-color: var(--text2); }
  .modal-btn.primary { background: var(--accent2); border-color: var(--accent); color: #fff; }
  .modal-btn.danger { border-color: var(--red); color: var(--red); }
  .modal-btn.danger:hover { background: rgba(248,81,73,0.1); }
  .modal.wide { max-width: 520px; min-width: 420px; }
  .modal textarea {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; margin-bottom: 12px; resize: vertical; min-height: 60px;
  }
  .modal textarea:focus { border-color: var(--accent); }
  .modal select {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; margin-bottom: 12px;
  }
  .modal select:focus { border-color: var(--accent); }
  .modal label.field-label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .modal .fetch-status { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-style: italic; }

  /* PDF link button */
  .pdf-link-btn {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    font-size: 11px; font-weight: 600; font-family: inherit;
    background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3);
    color: var(--green); border-radius: 5px; cursor: pointer; text-decoration: none;
    transition: all 0.12s;
  }
  .pdf-link-btn:hover { background: rgba(63,185,80,0.2); border-color: var(--green); }
  .pdf-link-btn.missing { opacity: 0.35; cursor: default; pointer-events: none; color: var(--text3); background: transparent; border-color: var(--border); }

  /* Notes toolbar (export/import) */
  .notes-toolbar {
    display: flex; gap: 6px; margin-top: 8px; align-items: center;
  }
  .notes-toolbar button {
    padding: 3px 8px; font-size: 10px; font-family: inherit; font-weight: 600;
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    background: transparent; color: var(--text3); transition: all 0.12s;
  }
  .notes-toolbar button:hover { color: var(--text2); border-color: var(--text2); }

  /* Export collection .bib button */
  .sidebar-export-btn {
    display: block; width: 100%; margin-top: 6px; padding: 5px 10px;
    font-size: 11px; font-weight: 600; font-family: inherit;
    background: transparent; border: 1px solid var(--border);
    color: var(--text3); border-radius: 5px; cursor: pointer; text-align: left;
    transition: all 0.12s;
  }
  .sidebar-export-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* Manual link chips */
  .link-papers-btn {
    display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px;
    font-size: 10px; font-weight: 600; font-family: inherit;
    background: transparent; border: 1px solid var(--border);
    color: var(--text3); border-radius: 4px; cursor: pointer; transition: all 0.12s;
  }
  .link-papers-btn:hover { color: var(--accent); border-color: var(--accent); }
  .manual-link { border: 1px solid var(--orange); color: var(--orange); }
  .manual-link .related-reason { color: var(--orange); }

  /* Link picker modal */
  .link-picker-list {
    max-height: 250px; overflow-y: auto; margin: 8px 0;
    border: 1px solid var(--border); border-radius: 6px;
  }
  .link-picker-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    font-size: 12px; border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.1s;
  }
  .link-picker-item:hover { background: var(--bg3); }
  .link-picker-item:last-child { border-bottom: none; }
  .link-picker-item input[type="checkbox"] { accent-color: var(--accent); }

  /* ─── PDF Viewer Panel ─── */
  .pdf-viewer-panel {
    position: fixed; top: 0; right: 0; width: 50vw; height: 100vh;
    background: var(--bg); border-left: 2px solid var(--border);
    z-index: 200; display: flex; flex-direction: column;
    box-shadow: -4px 0 20px rgba(0,0,0,0.4);
    transition: transform 0.2s ease;
  }
  .pdf-viewer-panel.hidden { transform: translateX(100%); pointer-events: none; }
  .pdf-viewer-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; background: var(--bg2); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<script>
// ─── App state (populated from SQLite on init) ───
let PAPERS = [];     // compatibility array — loaded from db
let FIGS = {};       // figure key → file path — loaded from db

// UI state
let currentView = "cards";
let searchQuery = "";
let selectedTags = new Set();
let expandedId = null;
let readFilter = "all";
let priorityFilter = "any";
let typeFilter = "all";
let tableSort = { col: "date_added", dir: "desc" };
let copiedTimers = {};
let pdfSearchEnabled = false;
let pdfSearchHits = {};
let activeCollection = null;
let openDropdownId = null;
let currentPdfSrc = "";

// ─── Init: load database then render ───
SCQ.init().then(() => {
  window._scqOnDirty = function(dirty) { updateSyncIndicator(!dirty); };
  loadPapersFromDB();
  render();
  updateSyncIndicator(true);
  loadSuggestions();
  _injectSourceStyles();
  // Auto-fetch new papers from saved scraper queries (configurable cooldown)
  autoFetchOnLoad();
});

function loadPapersFromDB() {
  const rows = SCQ.getAllPapers();
  PAPERS = rows.map(r => ({
    id: r.id,
    title: r.title,
    authors: r.authors,
    shortAuthors: r.short_authors || "",
    year: r.year,
    group: r.group_name || "",
    dateAdded: r.date_added || "",
    tags: _jp(r.tags, []),
    summary: r.summary || "",
    keyResults: _jp(r.key_results, []),
    url: r.url || "",
    citeBib: r.cite_bib || "",
    citeTxt: r.cite_txt || "",
    entryType: r.entry_type || "preprint",
    figures: [],
    // State fields from JOINs
    _read: !!r.is_read,
    _priority: r.priority || 0,
    _note: r.note || "",
    _lastEdited: r.last_edited || ""
  }));

  // Load figures for all papers
  FIGS = {};
  PAPERS.forEach(p => {
    const figs = SCQ.getFigures(p.id);
    p.figures = figs.map(f => ({ key: f.figure_key, label: f.label, desc: f.caption }));
    figs.forEach(f => { FIGS[f.figure_key] = f.file_path; });
  });
}

function _jp(str, fallback) {
  try { return JSON.parse(str); } catch { return fallback; }
}

// ─── Sync indicator ───
function updateSyncIndicator(synced) {
  const el = document.getElementById("sync-indicator");
  if (!el) return;
  if (synced) {
    el.textContent = "synced";
    el.style.color = "var(--green)";
    el.title = "All changes saved";
  } else {
    el.textContent = "unsaved changes";
    el.style.color = "var(--orange)";
    el.title = "Click 'Save database' to persist your changes";
  }
}

// ─── Export/Import ───
function exportJSON() {
  const state = SCQ.exportJSON();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "scq-database-state.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.name.endsWith(".db")) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const bytes = new Uint8Array(e.target.result);
      const SQL = SCQ.getDB().constructor;
      // Re-init is complex; reload the page with the new db
      // For now, save to localStorage and reload
      try {
        const binary = String.fromCharCode.apply(null, bytes);
        localStorage.setItem("scq-db-base64", btoa(binary));
        alert("Database imported! Reloading...");
        location.reload();
      } catch(err) {
        alert("Import failed: " + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    // JSON import (supports both state export and pending_papers.json from digest)
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);

        // Check if this is a pending_papers.json from arXiv digest
        if (data.digestDate && Array.isArray(data.papers)) {
          let added = 0;
          for (const p of data.papers) {
            // Check if paper already exists
            const existing = SCQ.queryOne("SELECT id FROM papers WHERE id = ?", [p.id]);
            if (existing) continue;

            SCQ.addPaper({
              id: p.id,
              title: p.title,
              authors: p.authors,
              short_authors: p.short_authors || "",
              year: p.year || new Date().getFullYear(),
              arxiv_id: p.id,
              url: p.abs_url || "https://arxiv.org/abs/" + p.id,
              summary: p.abstract || "",
              tags: JSON.stringify(p.categories || []),
              date_added: new Date().toISOString().slice(0, 10),
            });
            // Mark as unread with no priority (to-read)
            SCQ.setReadStatus(p.id, false);
            added++;
          }
          loadPapersFromDB();
          render();
          renderSidebar();
          alert(`Imported ${added} paper(s) from digest (${data.digestDate}).\n` +
                `${data.papers.length - added} already in database.\n\n` +
                `Remember to click "Save database" to persist.`);
        } else if (data.papers) {
          // Legacy state JSON format
          for (const [id, ps] of Object.entries(data.papers)) {
            if (ps.notes) SCQ.setNote(id, ps.notes);
            if (ps.read !== undefined) SCQ.setReadStatus(id, ps.read);
            if (ps.priority) SCQ.setPriority(id, ps.priority);
            if (ps.manualLinks) ps.manualLinks.forEach(lid => SCQ.linkPapers(id, lid));
            if (ps.highlights) ps.highlights.forEach(h => SCQ.addHighlight(id, h.text, h.page, h.color));
            if (ps.collections) ps.collections.forEach(c => SCQ.addToCollection(c, id));
          }
          loadPapersFromDB();
          render();
          alert("State imported successfully!");
        } else {
          alert("Unrecognized JSON format.");
        }
      } catch(err) {
        alert("Import failed: " + err.message);
      }
    };
    reader.readAsText(file);
  }
  event.target.value = "";
}

async function mergeFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!file.name.endsWith(".db")) {
    alert("Please select a .db file to merge.");
    event.target.value = "";
    return;
  }
  try {
    const stats = await SCQ.importDatabaseFile(file);
    loadPapersFromDB();
    render();
    renderSidebar();
    const msg = `Merge complete!\n\n` +
      `• ${stats.added} new paper${stats.added !== 1 ? 's' : ''} added\n` +
      `• ${stats.updated} paper${stats.updated !== 1 ? 's' : ''} updated\n` +
      `• ${stats.skipped} paper${stats.skipped !== 1 ? 's' : ''} unchanged\n\n` +
      `Remember to click "Save database" to download the merged .db file.`;
    alert(msg);
  } catch(err) {
    alert("Merge failed: " + err.message);
  }
  event.target.value = "";
}

function exportCollectionAsDB(collName) {
  const count = SCQ.exportCollectionDB(collName);
  if (count === 0) {
    alert("No papers in this collection.");
  }
}

// ─── PDF path helper ───
function getPdfPath(paperId) {
  return "pdfs/" + paperId.replace(/[^a-zA-Z0-9._-]/g, "_") + ".pdf";
}

// ─── Collection .bib export ───
function exportCollectionBib(collName) {
  const collPapers = SCQ.getCollectionPapers(collName);
  const bibs = collPapers.map(p => p.cite_bib).filter(Boolean);
  if (bibs.length === 0) { alert("No papers in this collection."); return; }
  const blob = new Blob([bibs.join("\n\n")], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = collName.replace(/[^a-zA-Z0-9_-]/g, "_") + ".bib";
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── Manual paper linking ───
function showLinkPaperModal(paperId) {
  const currentLinks = SCQ.getLinkedPapers(paperId).map(l => l.id);
  const others = PAPERS.filter(p => p.id !== paperId);
  const modalRoot = document.getElementById("modal-root");
  modalRoot.innerHTML = `
    <div class="modal-backdrop" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()" style="min-width:360px;max-width:460px">
        <h3>Link related papers to ${PAPERS.find(p=>p.id===paperId)?.shortAuthors || paperId}</h3>
        <div class="link-picker-list">
          ${others.map(p => `
            <label class="link-picker-item">
              <input type="checkbox" ${currentLinks.includes(p.id) ? 'checked' : ''}
                onchange="toggleManualLink('${paperId}', '${p.id}', this.checked)">
              <span>${p.shortAuthors} (${p.year}) — ${p.title.substring(0,50)}${p.title.length > 50 ? '…' : ''}</span>
            </label>
          `).join("")}
        </div>
        <div class="modal-btns">
          <button class="modal-btn primary" onclick="closeModal()">Done</button>
        </div>
      </div>
    </div>`;
}

function toggleManualLink(fromId, toId, checked) {
  if (checked) {
    SCQ.linkPapers(fromId, toId);
  } else {
    SCQ.unlinkPapers(fromId, toId);
  }
}

function toggleReadStatus(paperId, event) {
  if (event) event.stopPropagation();
  const p = PAPERS.find(x => x.id === paperId);
  const newStatus = !p._read;
  p._read = newStatus;
  SCQ.setReadStatus(paperId, newStatus);
  render();
}

function setStarRating(paperId, stars, event) {
  if (event) event.stopPropagation();
  const p = PAPERS.find(x => x.id === paperId);
  const newPriority = (p._priority === stars) ? 0 : stars;
  p._priority = newPriority;
  SCQ.setPriority(paperId, newPriority);
  render();
}

function renderStars(paperId) {
  const p = PAPERS.find(x => x.id === paperId);
  const current = p ? p._priority : 0;
  return [1,2,3].map(s =>
    `<button class="star-btn ${s <= current ? 'filled' : ''}" onclick="setStarRating('${paperId}', ${s}, event)" title="${s} star${s>1?'s':''}">&#9733;</button>`
  ).join("");
}

function setReadFilter(filter) {
  readFilter = filter;
  document.querySelectorAll(".filter-read-btn").forEach(b => b.classList.remove("active"));

// ─── Related papers detection ───
function getRelatedPapers(paper) {
  const related = [];
  const myLinks = SCQ.getLinkedPapers(paper.id).map(l => l.id);
  const myAuthors = paper.authors.split(",").map(a => a.trim().split(" ").pop().toLowerCase());
  const myTags = new Set(paper.tags.map(t => t.toLowerCase()));
  PAPERS.forEach(p => {
    if (p.id === paper.id) return;
    const reasons = [];
    if (myLinks.includes(p.id)) reasons.push("linked manually");
    const theirAuthors = p.authors.split(",").map(a => a.trim().split(" ").pop().toLowerCase());
    const shared = myAuthors.filter(a => theirAuthors.includes(a));
    if (shared.length >= 2) reasons.push("shared authors: " + shared.slice(0,3).join(", "));
    const theirTags = new Set(p.tags.map(t => t.toLowerCase()));
    const sharedTags = [...myTags].filter(t => theirTags.has(t));
    if (sharedTags.length >= 2) reasons.push("tags: " + sharedTags.slice(0,3).join(", "));
    if (p.group === paper.group) reasons.push("same group");
    if (reasons.length > 0) related.push({ paper: p, reasons });
  });
  related.sort((a, b) => {
    const aManual = a.reasons[0] === "linked manually" ? 1 : 0;
    const bManual = b.reasons[0] === "linked manually" ? 1 : 0;
    return bManual - aManual;
  });
  return related;
}

// ─── Helpers ───
function getAllTags() {
  const s = new Set();
  PAPERS.forEach(p => p.tags.forEach(t => s.add(t)));
  return [...s].sort();
}

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return PAPERS.filter(p => {
    let matchSearch = !q ||
      p.title.toLowerCase().includes(q) ||
      p.authors.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q)) ||
      p.summary.toLowerCase().includes(q) ||
      p.group.toLowerCase().includes(q) ||
      p.id.includes(q) ||
      (p._note || "").toLowerCase().includes(q) ||
      (p.keyResults || []).some(r => r.toLowerCase().includes(q));
    // Full-text PDF search via FTS5
    if (!matchSearch && pdfSearchEnabled && q) {
      const hits = SCQ.searchPdfText(q);
      if (hits[p.id]) {
        matchSearch = true;
        pdfSearchHits[p.id] = hits[p.id];
      }
    }
    const matchTags = selectedTags.size === 0 || [...selectedTags].every(t => p.tags.includes(t));
    const matchRead = readFilter === "all" ||
      (readFilter === "read" && p._read) ||
      (readFilter === "unread" && !p._read);
    const matchPriority = priorityFilter === "any" ||
      (priorityFilter === "starred" && p._priority >= 1) ||
      (priorityFilter === "high" && p._priority === 3);
    const matchType = typeFilter === "all" || (p.entryType || "preprint") === typeFilter;
    const matchCollection = !activeCollection || SCQ.getCollectionsForPaper(p.id).includes(activeCollection);
    return matchSearch && matchTags && matchRead && matchPriority && matchType && matchCollection;
  });
}

function fetchWebsiteMeta() {
  const url = document.getElementById("awm-url").value.trim();
  if (!url) return;
  const status = document.getElementById("awm-status");
  status.textContent = "Fetching page metadata...";

  // Try to detect arXiv IDs
  const arxivMatch = url.match(/arxiv\.org\/(?:abs|pdf)\/(\d{4}\.\d{4,5})/);
  if (arxivMatch) {
    const arxivId = arxivMatch[1];
    status.textContent = "Detected arXiv paper, fetching from API...";
    fetch(`https://export.arxiv.org/api/query?id_list=${arxivId}`)
      .then(r => r.text())
      .then(xml => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xml, 'text/xml');
        const entry = doc.querySelector('entry');
        if (entry) {
          const title = (entry.querySelector('title')?.textContent || '').replace(/\s+/g, ' ').trim();
          const authors = [...entry.querySelectorAll('author name')].map(n => n.textContent).join(', ');
          const summary = (entry.querySelector('summary')?.textContent || '').replace(/\s+/g, ' ').trim();
          document.getElementById("awm-title").value = title;
          document.getElementById("awm-authors").value = authors;
          document.getElementById("awm-summary").value = summary.substring(0, 500);
          document.getElementById("awm-type").value = 'preprint';
          // Auto-tag
          if (typeof SCRAPER_CONFIG !== 'undefined' && SCRAPER_CONFIG.tags) {
            const text = (title + ' ' + summary).toLowerCase();
            const matched = [];
            for (const [tag, keywords] of Object.entries(SCRAPER_CONFIG.tags)) {
              if (keywords.some(kw => text.includes(kw.toLowerCase()))) matched.push(tag);
            }
            if (matched.length > 0) document.getElementById("awm-tags").value = matched.join(', ');
          }
          status.textContent = "Populated from arXiv API.";
        } else {
          status.textContent = "Could not parse arXiv response.";
        }
      })
      .catch(e => { status.textContent = "arXiv fetch failed: " + e.message; });
    return;
  }

  // For generic URLs, try fetching via a CORS proxy or directly
  // From file:// we can't fetch most sites, so we show a helpful message
  status.textContent = "Auto-fetch not available for this URL (CORS). Please fill in details manually.";
  // Pre-fill the URL domain as a hint for the authors field
  try {
    const domain = new URL(url).hostname.replace('www.', '');
    if (!document.getElementById("awm-authors").value) {
      document.getElementById("awm-authors").value = domain;
    }
  } catch(e) {}
}

function submitAddWebsite() {
  const url = document.getElementById("awm-url").value.trim();
  const title = document.getElementById("awm-title").value.trim();
  if (!url) { alert("URL is required."); return; }
  if (!title) { alert("Title is required."); return; }

  const authors = document.getElementById("awm-authors").value.trim() || 'Unknown';
  const summary = document.getElementById("awm-summary").value.trim();
  const entryType = document.getElementById("awm-type").value;
  const tagsStr = document.getElementById("awm-tags").value.trim();
  const notes = document.getElementById("awm-notes").value.trim();
  const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];

  // Generate a stable ID from the URL
  const id = 'web-' + url.replace(/[^a-zA-Z0-9]/g, '').substring(0, 40) + '-' + Date.now().toString(36);
  const dateAdded = new Date().toISOString().slice(0, 10);

  // Short author for display
  const shortAuthors = authors.split(',')[0].trim();
  const year = new Date().getFullYear();

  // Detect arXiv ID from URL
  const arxivMatch = url.match(/arxiv\.org\/(?:abs|pdf)\/(\d{4}\.\d{4,5})/);
  const arxivId = arxivMatch ? arxivMatch[1] : '';
  const paperId = arxivId || id;

  SCQ.addPaper({
    id: paperId, title: title, authors: authors, shortAuthors: shortAuthors,
    year: year, journal: '', doi: '', arxiv_id: arxivId,
    url: url, group_name: '', dateAdded: dateAdded,
    tags: tags, summary: summary, keyResults: [],
    citeBib: '', citeTxt: '', pdf_path: '',
    entry_type: entryType
  });

  if (notes) {
    SCQ.setNote(paperId, notes);
  }

  closeModal();
  loadPapersFromDB();
  render();
}

// ─── Table sorting ───
function toggleSort(col) {
  if (tableSort.col === col) {
    tableSort.dir = tableSort.dir === "asc" ? "desc" : "asc";
  } else {
    tableSort.col = col;
    tableSort.dir = (col === "title" || col === "shortAuthors" || col === "group") ? "asc" : "desc";
  }
  render();
}

function sortPapers(papers) {
  const col = tableSort.col;
  const dir = tableSort.dir === "asc" ? 1 : -1;
  return [...papers].sort((a, b) => {
    let va, vb;
    if (col === "priority" || col === "_priority") { va = a._priority || 0; vb = b._priority || 0; }
    else if (col === "read" || col === "_read") { va = a._read ? 1 : 0; vb = b._read ? 1 : 0; }
    else if (col === "date_added" || col === "dateAdded") { va = a.dateAdded || ""; vb = b.dateAdded || ""; }
    else { va = a[col] || ""; vb = b[col] || ""; }
    if (typeof va === "string") return dir * va.localeCompare(vb);
    return dir * (va - vb);
  });
}

function sortArrow(col) {
  if (tableSort.col !== col) return `<span class="sort-arrow">&#8597;</span>`;
  return `<span class="sort-arrow">${tableSort.dir === "asc" ? "&#9650;" : "&#9660;"}</span>`;
}

function sortedClass(col) {
  return tableSort.col === col ? "sorted" : "";
}

let noteTimers = {};
function updateNotes(paperId, value) {
  const p = PAPERS.find(x => x.id === paperId);
  if (p) p._note = value;
  clearTimeout(noteTimers[paperId]);

function promptRenameTag(oldTag) {
  const newTag = prompt("Rename \"" + oldTag + "\" to:", oldTag);
  if (!newTag || newTag.trim() === "" || newTag.trim() === oldTag) return;
  SCQ.renameTags(oldTag, newTag.trim().toLowerCase());
  loadPapersFromDB();
  selectedTags.delete(oldTag);
  render();
  showTagManagerModal();
}

function promptMergeTag(tag) {
  const allTags = Object.keys(SCQ.getAllTags()).filter(t => t !== tag).sort();
  const target = prompt("Merge \"" + tag + "\" into which tag?\n\nExisting tags: " + allTags.join(", "), "");
  if (!target || target.trim() === "") return;
  SCQ.renameTags(tag, target.trim().toLowerCase());
  loadPapersFromDB();
  selectedTags.delete(tag);
  render();
  showTagManagerModal();
}

function doDeleteTag(tag) {
  if (!confirm("Remove the tag \"" + tag + "\" from all papers?")) return;
  SCQ.deleteTag(tag);
  loadPapersFromDB();
  selectedTags.delete(tag);
  render();
  showTagManagerModal();
}

//  SUGGESTIONS BANNER — reads scraper inbox from localStorage

let scraperInbox = [];
let suggestionsOpen = true; // start expanded so user sees them

function _injectSourceStyles() {
  const style = document.createElement('style');
  let css = '';
  for (const [key, src] of Object.entries(SCRAPER_CONFIG.sources)) {
    const c = src.color;
    const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
    css += `.sug-source.${key} { background: rgba(${r},${g},${b},0.15); color: ${c}; }\n`;
  }
  style.textContent = css;
  document.head.appendChild(style);
}

function loadSuggestions() {
  try {
    scraperInbox = JSON.parse(localStorage.getItem('scq-scraper-inbox') || '[]');
  } catch { scraperInbox = []; }

  // Filter out any that are already in the database
  const existingIds = new Set(PAPERS.map(p => p.id));
  scraperInbox = scraperInbox.filter(p => !existingIds.has(p.id));

  // Write back filtered list so scraper page stays in sync
  _saveSugInbox();
  renderSuggestions();
}

function renderSuggestions() {
  const banner = document.getElementById('suggestions-banner');
  const list = document.getElementById('sug-list');
  const countEl = document.getElementById('sug-count');
  const body = document.getElementById('suggestions-body');
  const toggle = document.getElementById('sug-toggle');

  if (scraperInbox.length === 0) {
    banner.style.display = 'none';
    return;
  }

  banner.style.display = 'block';
  countEl.textContent = scraperInbox.length;
  body.classList.toggle('open', suggestionsOpen);
  toggle.classList.toggle('open', suggestionsOpen);

  // Build source label map from config
  const sourceLabel = {};
  for (const [k, s] of Object.entries(_CFG.sources)) sourceLabel[k] = s.label;

  list.innerHTML = scraperInbox.map((p, i) => `
    <div class="sug-card">
      <div class="sug-card-info">
        <div class="sug-card-title">${_esc(p.title)}</div>
        <div class="sug-card-meta">
          <span class="sug-source ${p.source || 'arxiv'}">${sourceLabel[p.source] || (p.source || 'arxiv').toUpperCase()}</span>
          <span>${_esc(p.shortAuthors || '')} (${p.year || ''})</span>
          <span style="color:var(--text3)">${_esc(p.id)}</span>
        </div>
        <div class="sug-card-abstract">${_esc((p.summary || '').substring(0, 200))}</div>
        ${(p.tags && p.tags.length) ? `<div class="sug-card-tags">${p.tags.map(t => `<span>${_esc(t)}</span>`).join('')}</div>` : ''}
      </div>
      <div class="sug-card-actions">
        <button class="sug-btn sug-btn-add" onclick="sugAdd(${i})" title="Add to database as unread">+ Add</button>
        <button class="sug-btn sug-btn-ignore" onclick="sugIgnore(${i})" title="Dismiss this suggestion">Ignore</button>
        <a href="${_esc(p.url || '')}" target="_blank" class="sug-btn-link" title="View on source">&nearr;</a>
      </div>
    </div>
  `).join('');
}

function toggleSuggestions() {
  suggestionsOpen = !suggestionsOpen;
  document.getElementById('suggestions-body').classList.toggle('open', suggestionsOpen);
  document.getElementById('sug-toggle').classList.toggle('open', suggestionsOpen);
}

function sugAdd(idx) {
  const paper = scraperInbox[idx];
  if (!paper) return;

  const dateAdded = new Date().toISOString().slice(0, 10);
  const citeBib = _CFG.formatBibTeX(paper);
  const citeTxt = _CFG.formatPlainText(paper);

  // Determine entry type from source config
  const _srcCfg = (_CFG.sources && _CFG.sources[paper.source]) || {};
  const _entryType = _srcCfg.type === 'arxiv-jr' ? 'published' : 'preprint';

  SCQ.addPaper({
    id: paper.id, title: paper.title, authors: paper.authors || '',
    shortAuthors: paper.shortAuthors || 'Unknown',
    year: paper.year || new Date().getFullYear(),
    journal: paper.journal || '', doi: paper.doi || '',
    arxiv_id: paper.source === 'arxiv' ? paper.id : '',
    url: paper.url || '', group_name: '',
    dateAdded: dateAdded, tags: paper.tags || [],
    summary: paper.summary ? paper.summary.substring(0, 500) : '',
    keyResults: [], citeBib: citeBib, citeTxt: citeTxt,
    pdf_path: paper.source === 'arxiv' ? `pdfs/${paper.id}.pdf` : '',
    entry_type: _entryType
  });

  // Add note if the user wrote one in the scraper
  if (paper.note && paper.note.trim()) {
    SCQ.setNote(paper.id, paper.note.trim());
  }

  // Remove from inbox and refresh
  scraperInbox.splice(idx, 1);
  _saveSugInbox();
  loadPapersFromDB();
  render();
  renderSuggestions();
}

function sugIgnore(idx) {
  scraperInbox.splice(idx, 1);
  _saveSugInbox();
  renderSuggestions();
}

function dismissAllSuggestions() {
  if (scraperInbox.length === 0) return;
  if (!confirm('Dismiss all ' + scraperInbox.length + ' suggestions?')) return;
  scraperInbox = [];
  _saveSugInbox();
  renderSuggestions();
}

function _saveSugInbox() {
  try {
    localStorage.setItem('scq-scraper-inbox', JSON.stringify(scraperInbox));
  } catch(e) { console.warn('[Suggestions] save failed:', e.message); }
}

function _esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════════════════════════════════════════════════════
//  AUTO-FETCH — runs saved scraper queries on page load
//  with a 4-hour cooldown. Pure browser JS, OS-agnostic.
// ═══════════════════════════════════════════════════════════

const _CFG = SCRAPER_CONFIG; // shorthand for auto-fetch
const AUTO_FETCH_COOLDOWN_MS = (_CFG.autoFetch?.cooldownHours || 4) * 60 * 60 * 1000;
const AUTO_FETCH_TS_KEY = 'scq-scraper-last-autofetch';
const SAVED_QUERIES_KEY = 'scq-scraper-queries';

// Auto-tag using config dictionary
function _autoTag(title, abs) {
  const text = (title + ' ' + abs).toLowerCase();
  const tags = [];
  for (const [tag, kws] of Object.entries(_CFG.tags)) {
    for (const kw of kws) { if (text.includes(kw.toLowerCase())) { tags.push(tag); break; } }
  }
  return tags;
}

// Parse arXiv Atom XML into paper objects
function _parseArxivXml(xml, source) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  const entries = doc.querySelectorAll('entry');
  const papers = [];
  const srcCfg = _CFG.sources[source] || {};

  entries.forEach(entry => {
    const idUrl = entry.querySelector('id')?.textContent || '';
    const arxivId = idUrl.replace('http://arxiv.org/abs/', '').replace(/v\d+$/, '');
    const title = (entry.querySelector('title')?.textContent || '').replace(/\s+/g, ' ').trim();
    const summary = (entry.querySelector('summary')?.textContent || '').replace(/\s+/g, ' ').trim();
    const published = entry.querySelector('published')?.textContent || '';
    const year = published ? new Date(published).getFullYear() : '';
    const authors = [...entry.querySelectorAll('author name')].map(n => n.textContent);
    const categories = [...entry.querySelectorAll('category')].map(c => c.getAttribute('term'));
    const doiEl = entry.querySelector('doi');
    const doi = doiEl ? doiEl.textContent.trim() : '';
    const jrEl = entry.querySelector('journal_ref');
    const journalRef = jrEl ? jrEl.textContent.trim() : '';
    const shortAuthors = authors.length > 3
      ? authors[0].split(' ').pop() + ' et al.'
      : authors.map(a => a.split(' ').pop()).join(', ');

    papers.push({
      id: arxivId, title, summary, year, published,
      authors: authors.join(', '), shortAuthors, categories,
      source: source, url: `https://arxiv.org/abs/${arxivId}`,
      doi, journal: journalRef || srcCfg.journalName || '',
      tags: _autoTag(title, summary)
    });
  });
  return papers;
}

async function _fetchForSource(query, sourceKey) {
  const src = _CFG.sources[sourceKey];
  if (!src) throw new Error(`Unknown source: ${sourceKey}`);
  const maxResults = _CFG.autoFetch?.maxResultsPerQuery || 25;

  let url;
  if (src.type === 'arxiv') {
    url = `https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(query)}&start=0&max_results=${maxResults}&sortBy=submittedDate&sortOrder=descending`;
  } else if (src.type === 'arxiv-jr') {
    url = `https://export.arxiv.org/api/query?search_query=all:${encodeURIComponent(query)}+AND+jr:${src.journalRef}&start=0&max_results=${maxResults}&sortBy=submittedDate&sortOrder=descending`;
  } else {
    throw new Error(`Unsupported source type: ${src.type}`);
  }

  const resp = await fetch(url);
  if (!resp.ok) throw new Error(sourceKey + ' ' + resp.status);
  return _parseArxivXml(await resp.text(), sourceKey);
}

async function autoFetchOnLoad() {
  // 0. Check if auto-fetch is enabled in config
  if (_CFG.autoFetch?.enabled === false) return;

  // 1. Check if we have saved queries
  let savedQueries = [];
  try { savedQueries = JSON.parse(localStorage.getItem(SAVED_QUERIES_KEY) || '[]'); }
  catch { return; }
  if (savedQueries.length === 0) return;

  // 2. Check cooldown
  const lastFetch = parseInt(localStorage.getItem(AUTO_FETCH_TS_KEY) || '0', 10);
  const now = Date.now();
  const cooldownHrs = _CFG.autoFetch?.cooldownHours || 4;
  if (now - lastFetch < AUTO_FETCH_COOLDOWN_MS) {
    const hoursAgo = ((now - lastFetch) / 3600000).toFixed(1);
    console.log(`[Auto-fetch] Skipping — last fetch was ${hoursAgo}h ago (cooldown: ${cooldownHrs}h)`);
    return;
  }

  // 3. Run queries in background
  const statusEl = document.getElementById('sug-fetch-status');
  const banner = document.getElementById('suggestions-banner');

  banner.style.display = 'block';
  statusEl.textContent = 'Checking for new papers...';

  const existingIds = new Set(PAPERS.map(p => p.id));
  const inboxIds = new Set(scraperInbox.map(p => p.id));
  let totalNew = 0;
  const delay = _CFG.autoFetch?.delayBetweenQueries || 1500;

  for (let i = 0; i < savedQueries.length; i++) {
    const q = savedQueries[i];
    statusEl.textContent = `Fetching ${i + 1}/${savedQueries.length}: "${q.query}"`;

    try {
      const results = await _fetchForSource(q.query, q.source);

      results.forEach(paper => {
        if (!existingIds.has(paper.id) && !inboxIds.has(paper.id)) {
          scraperInbox.push({ ...paper, note: '', stagedAt: new Date().toISOString() });
          inboxIds.add(paper.id);
          totalNew++;
        }
      });
    } catch (e) {
      console.warn(`[Auto-fetch] "${q.query}" failed:`, e.message);
    }

    if (i < savedQueries.length - 1) await new Promise(r => setTimeout(r, delay));
  }

  // 4. Save results and update timestamp
  localStorage.setItem(AUTO_FETCH_TS_KEY, String(now));
  _saveSugInbox();

  if (totalNew > 0) {
    statusEl.textContent = `Found ${totalNew} new paper${totalNew > 1 ? 's' : ''}`;
    statusEl.style.color = 'var(--green)';
    renderSuggestions();
  } else {
    statusEl.textContent = 'No new papers found';
    // Hide banner if inbox is still empty
    if (scraperInbox.length === 0) {
      setTimeout(() => { banner.style.display = 'none'; statusEl.textContent = ''; }, 3000);
    }
  }

  // Fade out status after a few seconds
  setTimeout(() => {
    statusEl.style.transition = 'opacity 1s';
    statusEl.style.opacity = '0';
    setTimeout(() => { statusEl.style.opacity = '1'; statusEl.style.transition = ''; statusEl.textContent = ''; }, 1000);
  }, 5000);

  console.log(`[Auto-fetch] Done. ${totalNew} new papers from ${savedQueries.length} queries.`);
}

</script>
